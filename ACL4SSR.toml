version = 1
[custom]
enable_rule_generator = true
overwrite_original_rules = true
skip_failed_links = true

# Options for custom base configuration file
clash_rule_base = "https://raw.githubusercontent.com/zhongfly/clash-config/master/clash.yml"
#surge_rule_base = "base/surge.conf"
#surfboard_rule_base = "base/surfboard.conf"
#mellow_rule_base = "base/mellow.conf"
#quan_rule_base = "base/quan.conf"
#quanx_rule_base = "base/quanx.conf"

# Options for adding emojis
add_emoji = true
remove_old_emoji = true

# Options for filtering nodes
#include_remarks = []
exclude_remarks = ["(流量|时间|产品|免费|耗尽|到期|订阅|更新|剩余|可用|当前|卡顿)","^(官网|群组|频道)","IPv6测试节点","wuan|HKIX@Bosa"]

# 设置分组标志位
[[custom_groups]]
name = "🚀 节点选择"
type = "select"
rule = [
    "[]♻️ 自动",
    "[]🎯 全球直连",
    ".*"
]

[[custom_groups]]
name = "♻️ 自动"
type = "url-test"
rule = ["(^(?!.*(?i:日本)).*)"]
url = "http://www.gstatic.com/generate_204"
interval = 60
tolerance = 50

[[custom_groups]]
name = "🤖 AI"
type = "select"
rule = [
    "[]♻️ 境外",
    "[]♻️ 自动",
    "[]🚀 节点选择",
    ".*"
]

[[custom_groups]]
name = "📖 漫画"
type = "select"
rule = [
    "[]✴️ 负载均衡",
    "[]🚀 节点选择",
    "[]🎯 全球直连",
    "(^(?!.*(?i:JP|Japan|Tokyo|Osaka|Saitama|日本|东京|大阪|埼玉|[^-]日)).*)"
]

[[custom_groups]]
name = "✴️ 负载均衡"
type = "load-balance"
rule = ["(^(?!.*(?i:JP|Japan|Tokyo|Osaka|Saitama|日本|东京|大阪|埼玉|[^-]日)).*)"]
interval = 60
strategy = "round-robin"
url = "http://www.gstatic.com/generate_204"

[[custom_groups]]
name = "♻️ 境外"
type = "load-balance"
rule = ["(^(?!.*(?i:HK|香港|MO|澳门)).*)"]
url = "http://www.gstatic.com/generate_204"
interval = 60
strategy = "sticky-sessions"

[[custom_groups]]
name = "🎯 全球直连"
type = "select"
rule = ["[]DIRECT"]

[[custom_groups]]
name = "🛑 全球拦截"
type = "select"
rule = ["[]REJECT", "[]DIRECT","[]🚀 节点选择",".*"]

[[custom_groups]]
name = "🐟 漏网之鱼"
type = "select"
rule = ["[]🚀 节点选择",
"[]🎯 全球直连",
"[]♻️ 自动"]
# 设置分组标志位


# 设置规则标志位
